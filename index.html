<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI vs Human Attribution Coding Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>AI vs Human Attribution Coding Tool</h2>

      <label><strong>Paper ID:</strong></label>
      <input type="text" id="paperID" placeholder="e.g., Smith_2024">

      <label><strong>Study ID:</strong></label>
      <input type="text" id="studyID" placeholder="e.g., Smith_2024_Study1">

      <label><strong>Coder Name:</strong></label>
      <input type="text" id="coderName" placeholder="Your name">

      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>

      <h3 id="questionText"></h3>
      <div id="helperText" class="helper-text"></div>
      <div id="options"></div>

      <div class="controls">
        <button class="nav-btn" onclick="nextStudy()">Save Study & Start New</button>
        <button class="nav-btn export" onclick="exportCSV()">Export All to CSV</button>
      </div>

      <div id="summaryArea"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
